name: ai-test-workflow
version: 1.8
description: AI-driven automated testing pipeline with Execution Logging

# ==========================================
# 1. 角色定义 (Roles)
# ==========================================
roles:
  supervisor:
    type: main
    desc: "Orchestrator. Parses input, manages state, dispatches tasks."
    initialization: |
      1. Resolve profile: agents/profiles/<name>.md -> .test-workspace/agents/<name>.md.
      2. IF NEITHER EXISTS: Run 'agents/self-check-instructions.md', save to '.test-workspace/agents/<name>.md'.
      3. Load profile; apply its degradation as Layer-3 default.

  sub_agents:
    - id: case-generator
      task: "Analyze Spec/Code, generate test-cases.md"
    - id: planner
      task: "Plan strategy, generate test-task.md AND/OR manual-test-guide.md"
    - id: executor
      task: "Deploy/Execute/Validate"
    - id: reporter
      task: "Summarize results, fix code, generate report"

# ==========================================
# 2. 全局规则 (Rules)
# ==========================================
rules:
  isolation:
    - input_source: "Read-Only. NEVER write to input paths."
    - output_base: "ALWAYS write to '.test-workspace/runs/<requirement-id>/'. Never mix inputs and outputs."
    - framework_readonly: "NEVER write to '.test-sop/'. All accumulation goes to '.test-workspace/'."
  logging:
    - artifact: "execution-log.md"
      requirement: "Every tool call (RPC, HTTP, SQL, Shell) MUST be logged with params/result BEFORE execution."

  # --- Degradation Rules: 3-Layer Inheritance ---
  degradation:
    description: |
      Degradation rules follow a 3-layer inheritance chain:
        Case level > Requirement level > Global (Agent Profile)
      Only overrides need to be specified; unspecified keys inherit from the parent layer.
    resolution_algorithm: |
      effective_rules = merge(
        agent_profile.degradation,       # Layer 3: Global default (.test-workspace/agents/<profile>.md, resolved from agents/profiles/)
        test_config.degradation,         # Layer 2: Requirement level (test-config.yaml)
        current_case.degradation         # Layer 1: Case level (test-task.md per-case block)
      )
      # Later layers override earlier layers. Unspecified keys pass through.
    actions:
      SKIP: "Skip the validation layer, mark result as SKIPPED."
      FAIL: "Mark the test case as FAIL immediately."
      MANUAL: "Degrade to assisted mode, generate manual-test-guide for this step."
      FALLBACK: "Use alternative adapter. Format: FALLBACK:<adapter-name>."
    triggers:
      - no_mcp
      - no_shell
      - no_deploy
      - no_database

# ==========================================
# 3. 执行模式 (Execution Modes)
# ==========================================
execution_modes:
  full-auto:
    flow: "spec -> test-cases -> test-task -> test-execution -> test-report"
  assisted:
    flow: "spec -> test-cases -> test-task -> manual-test-guide -> (Human Input) -> test-results -> test-report"

# ==========================================
# 4. 通信协议 (Communication)
# ==========================================
communication:
  protocol: file-based
  state_file: test-status.json

# ==========================================
# 5. 产物定义 (Artifacts)
# ==========================================
artifacts:
  - id: spec
    generated_by: supervisor
    requires: []
  - id: test-cases
    generated_by: case-generator
    requires: [spec]
    user_review: true
  - id: test-task
    generated_by: planner
    requires: [test-cases]
    user_review: true
  - id: manual-test-guide
    generated_by: planner
    requires: [test-task]
    condition: "execution_mode == 'assisted'"
  - id: test-results
    generated_by: executor
    requires: [test-task]
    condition: "execution_mode == 'full-auto'"
  - id: test-report
    generated_by: reporter
    requires: [test-results]

loops:
  repair-cycle:
    trigger: "test-results.json contains FAIL"
    max_iterations: 3

output_base: .test-workspace/runs/<requirement-id>/
