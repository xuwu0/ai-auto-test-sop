name: ai-test-workflow
version: 1
description: AI-driven automated testing pipeline

# ==========================================
# 1. 角色定义 (Roles)
# ==========================================
# 定义了流程中涉及的 Agent 角色。
# Main Agent (Supervisor) 根据此定义决定是“自己干”还是“招人干”。
roles:
  supervisor:
    type: main
    desc: "总控 Agent。负责意图解析、状态维护、任务分发、与用户交互。"
    capabilities_required: ["file_read", "file_write", "state_management"]
    
  sub_agents:
    - id: case-generator
      task: "分析 Spec 和代码，执行双向 Diff，生成 test-cases.md"
      capabilities_required: ["file_read", "search_files", "write_file"]
      
    - id: planner
      task: "规划执行策略、Mock 方案、预置 SQL，生成 test-task.md"
      capabilities_required: ["file_read", "write_file", "mcp_database"]
      
    - id: executor
      task: "执行用例、部署服务、四层校验，生成 test-results.json"
      capabilities_required: ["shell_exec", "mcp_trigger", "mcp_logging", "mcp_database"]
      
    - id: reporter
      task: "汇总结果、分析修复，生成 test-report.md"
      capabilities_required: ["file_read", "write_file"]

# ==========================================
# 2. 工作流图 (Artifact DAG)
# ==========================================
# 定义了产出物之间的依赖关系。
# 无论串行还是并行，都必须遵循此依赖顺序。
artifacts:
  - id: spec
    generated_by: supervisor
    requires: []
    
  - id: test-cases
    generated_by: case-generator
    requires: [spec]
    user_review: true
    
  - id: test-task
    generated_by: planner
    requires: [test-cases]
    user_review: true
    
  - id: test-results
    generated_by: executor
    requires: [test-task]
    
  - id: test-report
    generated_by: reporter
    requires: [test-results]

# 输出根目录
output_base: test-runs/<requirement-id>/
