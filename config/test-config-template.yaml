schema: ai-test-workflow

# Execution Mode: full-auto (AI runs all) | assisted (Human runs tests)
execution_mode: full-auto

project:
  name: my-project

adapters:
  trigger: hsf
  logging: sls
  database: dms
  deployment: aone

context: |
  Tech stack: Java, Spring Boot.

mcp:
  tools:
    group-env: { enabled: true }
    dms-mcp-server: { enabled: true }
    sls-mcp: { enabled: true }
