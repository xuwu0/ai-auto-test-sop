schema: ai-test-workflow

# Execution Mode: full-auto (AI runs all) | assisted (Human runs tests)
execution_mode: full-auto

project:
  name: <your-project-name>

# Bind workflow capabilities to concrete adapter names you maintain
# under .test-workspace/adapters/<category>/<name>.md.
# Concrete server-to-capability bindings live in .test-workspace/adaptations.yaml.
capabilities:
  cap.trigger.rpc:    <adapter-name>     # e.g., your RPC trigger adapter
  cap.trigger.http:   <adapter-name>
  cap.log.query:      <adapter-name>
  cap.database.query: <adapter-name>
  cap.deploy.async:   <adapter-name>
  cap.config.read:    <adapter-name>
  cap.diagnose.trace: <adapter-name>

context: |
  <Project context — tech stack, runtime, conventions, etc.>

mcp:
  # List the capability names you have MCP servers for.
  # Map each name to a concrete server in .test-workspace/adaptations.yaml.
  enabled_capabilities: []

# --- Requirement-Level Degradation Override (Layer 2) ---
# Only specify keys you want to override from the Agent Profile defaults.
# Unspecified keys inherit from agents/profiles/<profile>.md
# (or .test-workspace/agents/<profile>.md).
# Available actions: SKIP | FAIL | MANUAL | FALLBACK:<adapter>
#
# degradation:
#   no_mcp:    FAIL       # This requirement MUST have MCP, fail otherwise
#   no_deploy: SKIP       # Deployment not needed for this requirement
